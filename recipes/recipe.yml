---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: nocblue
description: Personal Fedora 44 bootc image with niri, Noctalia, BlueBuild, Brew, and gaming defaults.

base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44
platforms:
  - linux/amd64

labels:
  org.opencontainers.image.source: https://github.com/screwys/nocblue

modules:
  - type: script
    scripts:
      - reconcile-recipe-dependencies.sh

  - type: dnf
    repos:
      files:
        - niri.repo
        - terra.repo
        - secureblue-packages-fedora.repo
        - brave-browser-beta.repo
        - helium.repo
        - mullvad.repo
        - librewolf.repo
        - https://repo.secureblue.dev/secureblue.repo
      nonfree: rpmfusion
    install:
      install-weak-deps: false
      allow-erasing: true
      packages:
        - niri
        - xwayland-satellite
        - ghostty
        - fish
        - fastfetch
        - just
        - gh
        - jq
        - nodejs24-bin
        - nodejs24-npm-bin
        - pnpm
        - ripgrep
        - fd-find
        - bat
        - eza
        - fzf
        - tree
        - curl
        - wget2-wget
        - unzip
        - 7zip
        - yq
        - yt-dlp
        - direnv
        - neovim
        - socat
        - zoxide
        - btop
        - duf
        - du-dust
        - hyperfine
        - tokei
        - ShellCheck
        - shfmt
        - uv
        - android-tools
        - java-latest-openjdk-devel
        - golang
        - rust
        - cargo
        - gcc
        - gcc-c++
        - make
        - cmake
        - pkgconf-pkg-config
        - openssl-devel
        - gstreamer1-devel
        - gstreamer1-plugins-base-devel
        - gstreamer1-plugins-bad-free-devel
        - gnome-keyring
        - dbus-tools
        - polkit
        - nautilus
        - nautilus-python
        - loupe
        - showtime
        - xdg-desktop-portal-gnome
        - xdg-desktop-portal-gtk
        - sddm
        - sddm-x11
        - xorg-x11-server-Xorg
        - qt6ct
        - fcitx5
        - fcitx5-mozc
        - fcitx5-configtool
        - fcitx5-gtk
        - fcitx5-qt
        - adwaita-cursor-theme
        - google-noto-sans-cjk-fonts
        - firewalld
        - flatpak
        - flatpak-builder
        - podman-docker
        - podman-compose
        - fuse
        - fuse-libs
        - nm-connection-editor
        - NetworkManager-tui
        - NetworkManager-wifi
        - network-manager-applet
        - bubblewrap
        - xdg-dbus-proxy
        - shim-x64
        - grub2-efi-x64-cdboot
        - grub2-tools
        - anaconda
        - anaconda-core
        - anaconda-dracut
        - anaconda-install-env-deps
        - dracut-config-generic
        - dracut-network
        - net-tools
        - squashfs-tools
        - lorax-templates-generic
        - biosdevname
        - prefixdevname
        - python3-mako
        - pipx
        - mokutil
        - openssl
        - kmod
        - cryptsetup
        - tpm2-tools
        - zram-generator
        - hardened_malloc
        - no_rlimit_as
        - xz
        - zstd
        - dracut
        - patch
        - wl-clipboard
        - grim
        - slurp
        - wf-recorder
        - cliphist
        - wlsunset
        - wl-mirror
        - wtype
        - brightnessctl
        - ddcutil
        - libnotify
        - ImageMagick
        - tesseract
        - tesseract-langpack-eng
        - tesseract-langpack-jpn
        - tesseract-langpack-jpn_vert
        - kde-connect
        - kde-connect-nautilus
        - kf6-kitemmodels
        - radicale3
        - radicale3-selinux
        - nginx
        - input-remapper
        - libinput-utils
        - steam-devices
        - gamescope
        - mangohud
        - vulkan-tools
        - vkBasalt
        - firefox
        - brave-origin-beta
        - helium-bin
        - librewolf
        - mullvad-browser
        - trivalent
        - trivalent-selinux
        - zed
        - libappindicator-gtk3
    remove:
      auto-remove: false
      packages:
        - ptyxis
        - gnome-terminal
        - gnome-terminal-nautilus
        - gnome-console
        - kgx

  - type: dnf
    install:
      install-weak-deps: false
      skip-unavailable: true
      packages:
        - umu-launcher
        - adw-gtk3-theme
        - scx-scheds
        - scx-tools

  - type: containerfile
    snippets:
      - >-
        RUN --mount=type=bind,from=ghcr.io/ublue-os/akmods:main-44,src=/rpms,dst=/tmp/rpms,ro
        rpm-ostree install /tmp/rpms/common/*openrazer*.rpm /tmp/rpms/kmods/*openrazer*.rpm &&
        rpm -q openrazer-kmod-common kmod-openrazer

  # Userspace only. Keep this after the signed ublue akmods RPMs so
  # openrazer-kmod-common satisfies the daemon dependency without pulling the
  # OBS DKMS package.
  - type: dnf
    repos:
      files:
        - openrazer.repo
    install:
      install-weak-deps: false
      packages:
        - openrazer-daemon
        - python3-openrazer
        - polychromatic

  - type: files
    files:
      - source: system
        destination: /

  - type: script
    scripts:
      - install-candy-icons.sh
      - stage-noctalia-plugins.sh
      - install-pywalfox.sh
      - patch-noctalia-starship-template.sh
      - install-browser-policies.sh
      - install-protonvpn.sh
      - install-noctalia-sddm-theme.sh
      - configure-sddm.sh
      - configure-anticheat-support.sh
      - configure-hardened-malloc.sh
      - configure-ipsec-selinux.sh
      - build-loupe-reuse-window.sh
      - patch-native-media-apps.sh

  - type: brew
    nofile-limits: true
    brew-analytics: false

  - type: systemd
    system:
      enabled:
        - nocblue-flatpak-overrides.service
        - nocblue-hardened-malloc-flatpaks.service
        - nocblue-session-defaults.service
        - bootc-fetch-apply-updates.timer
        - flatpak-system-update.timer
        - input-remapper.service
        - firewalld.service
        - me.proton.vpn.split_tunneling.service
        - sddm.service
      disabled:
        - gdm.service
      masked:
        - geoclue.service
        - rpm-ostree-countme.timer
        - sshd.service
        - sshd.socket
        - sshd-keygen.target
    user:
      enabled:
        - nocblue-user-defaults.service
        - nocblue-adwsteamgtk.timer
        - nocblue-game-shortcuts-sync.timer
        - nocblue-icon-theme-sync.timer
        - nocblue-flatpak-icon-fixes.service

  - type: script
    scripts:
      - finalize.sh
      - validate-image.sh

  - type: signing
