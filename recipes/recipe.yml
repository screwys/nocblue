---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
#
# This is the final nocblue desktop image. Its compatibility base retains
# Secureblue userspace while providing Fedora kernel/OpenRazer ABI pairing.
name: nocblue
description: Personal Fedora 44 bootc image with nocblue desktop defaults on the validated Fedora/OpenRazer compatibility base.

base-image: ghcr.io/screwys/nocblue-fedora-openrazer
image-version: latest
platforms:
  - linux/amd64

labels:
  org.opencontainers.image.source: https://github.com/screwys/nocblue

modules:
  - type: dnf
    repos:
      files:
        - niri.repo
        - noctalia-v5.repo
        - terra.repo
        - brave-browser-beta.repo
        - helium.repo
        - mullvad.repo
        - librewolf.repo
    install:
      install-weak-deps: false
      allow-erasing: true
      exclude:
        - "kernel*"
      packages:
        # Desktop/session stack.
        - niri
        - xwayland-satellite
        - noctalia-git
        - noctalia-greeter
        - greetd
        - ghostty
        - qt6ct
        - xdg-desktop-portal-gnome
        - xdg-desktop-portal-gtk
        - fish
        - fastfetch
        - just
        - gh
        - jq
        - nodejs24-bin
        - nodejs24-npm-bin
        - pnpm
        - ripgrep
        - fd-find
        - bat
        - eza
        - fzf
        - tree
        - curl
        - wget2-wget
        - unzip
        - 7zip
        - yq
        - direnv
        - neovim
        - socat
        - zoxide
        - btop
        - duf
        - du-dust
        - hyperfine
        - tokei
        - ShellCheck
        - shfmt
        - uv
        - android-tools
        - java-latest-openjdk-devel
        - golang
        - rust
        - cargo
        - rpmdevtools
        - copr-cli
        - rpmlint
        - rust2rpm
        - gcc
        - gcc-c++
        - make
        - cmake
        - pkgconf-pkg-config
        - libtalloc-devel
        - openssl
        - openssl-devel
        - dbus-devel
        - libepoxy-devel
        - mpv-devel
        - clang-tools-extra
        - sdbus-cpp-devel
        - librsvg2-devel
        - polkit-devel
        - wireplumber-devel
        - pam-devel
        - libcurl-devel
        - libqalculate-devel
        - md4c-devel
        - json-devel
        - tomlplusplus-devel
        - libwebp-devel
        - stb_image_resize2-devel
        - stb_image_write-devel
        - jemalloc-devel
        - gstreamer1-devel
        - gstreamer1-plugins-base-devel
        - gstreamer1-plugins-bad-free-devel
        - patch
        - no_rlimit_as

        # Desktop apps and integration.
        - gnome-keyring
        - dbus-tools
        - polkit
        - nautilus
        - nautilus-python
        - loupe
        - showtime
        - fcitx5
        - fcitx5-mozc
        - fcitx5-configtool
        - fcitx5-gtk
        - fcitx5-qt
        - adwaita-cursor-theme
        - google-noto-sans-cjk-fonts
        - firewalld
        - flatpak
        - flatpak-builder
        - podman-docker
        - podman-compose
        - nm-connection-editor
        - NetworkManager-tui
        - NetworkManager-wifi
        - bubblewrap
        - xdg-dbus-proxy

        # System and boot tools.
        - pipx
        - mokutil
        - kmod
        - cryptsetup
        - tpm2-tools
        - zram-generator
        - xz
        - zstd
        - dracut

        # Wayland, OCR, gaming, local services, and browsers.
        - wl-clipboard
        - grim
        - slurp
        - wf-recorder
        - cliphist
        - wlsunset
        - wl-mirror
        - wtype
        - brightnessctl
        - ddcutil
        - libnotify
        - ImageMagick
        - tesseract
        - tesseract-langpack-eng
        - tesseract-langpack-jpn
        - tesseract-langpack-jpn_vert
        - kde-connect
        - kde-connect-nautilus
        - kf6-kitemmodels
        - radicale3
        - radicale3-selinux
        - nginx
        - input-remapper
        - libinput-utils
        - gamescope
        - mangohud
        - steam-devices
        - vulkan-tools
        - vkBasalt
        - firefox
        - brave-origin-beta
        - helium-bin
        - librewolf
        - mullvad-browser
        - zed
        - libappindicator-gtk3
    remove:
      auto-remove: false
      packages:
        - ptyxis
        - gnome-terminal
        - gnome-terminal-nautilus
        - gnome-console
        - kgx
        - gnome-classic-session

  - type: dnf
    install:
      install-weak-deps: false
      skip-unavailable: true
      exclude:
        - "kernel*"
      packages:
        - adw-gtk3-theme
        - umu-launcher
        - scx-scheds
        - scx-tools

  - type: files
    files:
      - source: system
        destination: /

  - type: script
    scripts:
      - install-candy-icons.sh
      - configure-nocblue-branding.sh
      - install-pywalfox.sh
      - install-browser-policies.sh
      - configure-hardened-portal.sh
      - configure-standard-malloc-browsers.sh
      - configure-sandbox-userns-selinux.sh
      - configure-flatpak-builder-hardened.sh
      - install-protonvpn.sh
      - install-nix-portable.sh
      - install-nix-portable-proot.sh
      - install-nix-launcher.sh
      - configure-anticheat-support.sh
      - build-loupe-reuse-window.sh
      - patch-native-media-apps.sh

  - type: brew
    nofile-limits: true
    brew-analytics: false

  - type: systemd
    system:
      enabled:
        - nocblue-sandbox-userns-selinux.service
        - nocblue-session-defaults.service
        - input-remapper.service
        - firewalld.service
        - me.proton.vpn.split_tunneling.service
        - greetd.service
      masked:
        - geoclue.service
        - sshd.service
        - sshd.socket
        - sshd-keygen.target
    user:
      enabled:
        - secureblue-flatpak-setup.timer
        - flatpak-user-update.timer
        - nocblue-flatpak-setup.timer
        - nocblue-adwsteamgtk.timer
        - nocblue-game-shortcuts-sync.timer
        - nocblue-icon-theme-sync.timer
        - nix-portable-gc.timer
        - nocblue-flatpak-icon-fixes.service
        - noctalia.service
      masked:
        - security-update-notification.path
        - security-update-notification.service

  # Nocblue may update preload libraries after inheriting the compatibility
  # base, so regenerate and revalidate the final initramfs as the last mutable
  # boot-related operation.
  - type: containerfile
    snippets:
      - RUN ldconfig

  - type: initramfs

  - type: containerfile
    snippets:
      - RUN /usr/libexec/nocblue/validate-fedora-openrazer-compat.sh

  # Keep normal GNOME as a complete fallback even though greetd starts Niri by default.
  - type: containerfile
    snippets:
      - >-
        RUN rpm -q secureblue-logos gdm gnome-shell gnome-session-wayland-session gnome-control-center &&
        ! rpm -q gnome-classic-session >/dev/null 2>&1 &&
        test -f /usr/share/wayland-sessions/gnome.desktop &&
        test ! -e /usr/share/wayland-sessions/gnome-classic.desktop &&
        test -f /usr/share/applications/org.gnome.Settings.desktop &&
        test -f /usr/share/wayland-sessions/niri.desktop

  - type: signing
