---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: nocblue
description: Personal Fedora 44 bootc image with niri, Noctalia, BlueBuild, Brew, and gaming defaults.

base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44
platforms:
  - linux/amd64

labels:
  org.opencontainers.image.source: https://github.com/screwys/nocblue

modules:
  - type: dnf
    repos:
      files:
        - terra.repo
        - secureblue-packages-fedora.repo
        - https://repo.librewolf.net/librewolf.repo
        - https://repo.secureblue.dev/secureblue.repo
      nonfree: rpmfusion
    install:
      install-weak-deps: false
      packages:
        - niri
        - xwayland-satellite
        - noctalia-shell
        - ghostty
        - fish
        - fastfetch
        - just
        - gnome-keyring
        - dbus-tools
        - polkit
        - lxqt-policykit
        - nautilus
        - nautilus-python
        - xdg-desktop-portal-gnome
        - xdg-desktop-portal-gtk
        - qt6ct
        - fcitx5
        - fcitx5-mozc
        - fcitx5-configtool
        - fcitx5-gtk
        - fcitx5-qt
        - candy-icon-theme
        - google-noto-sans-cjk-fonts
        - firewalld
        - flatpak
        - shim-x64
        - grub2-efi-x64-cdboot
        - grub2-tools
        - mokutil
        - openssl
        - kmod
        - cryptsetup
        - tpm2-tools
        - hardened_malloc
        - no_rlimit_as
        - xz
        - zstd
        - dracut
        - wl-clipboard
        - grim
        - slurp
        - wf-recorder
        - cliphist
        - wl-mirror
        - wtype
        - brightnessctl
        - ddcutil
        - libnotify
        - ImageMagick
        - tesseract
        - tesseract-langpack-eng
        - tesseract-langpack-jpn
        - tesseract-langpack-jpn_vert
        - kde-connect
        - kde-connect-nautilus
        - radicale3
        - radicale3-selinux
        - input-remapper
        - libinput-utils
        - steam-devices
        - gamescope
        - mangohud
        - vulkan-tools
        - vkBasalt
        - firefox
        - librewolf
        - trivalent
        - trivalent-selinux
        - zed
        - torbrowser-launcher
        - libappindicator-gtk3
    remove:
      auto-remove: false
      packages:
        - ptyxis
        - gnome-terminal
        - gnome-terminal-nautilus
        - gnome-console
        - kgx

  - type: dnf
    install:
      install-weak-deps: false
      skip-unavailable: true
      packages:
        - umu-launcher
        - adw-gtk3-theme
        - openrazer-polychromatic
        - scx-scheds
        - scx-tools

  - type: akmods
    base: main
    install:
      - openrazer

  - type: files
    files:
      - source: system
        destination: /

  - type: script
    scripts:
      - install-protonvpn.sh
      - configure-hardened-malloc.sh

  - type: brew
    nofile-limits: true
    brew-analytics: false

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - io.github.kolunmi.Bazaar
          - com.belmoussaoui.Authenticator
          - studio.planetpeanut.Bobby
          - io.github.diegopvlk.Cine
          - org.gnome.Papers
          - org.gnome.Loupe
          - org.gnome.Showtime
          - com.github.tchx84.Flatseal
          - org.gnome.Fractal
          - io.github.ilya_zlobintsev.LACT
          - io.github.radiolamp.mangojuice
          - io.missioncenter.MissionCenter
          - com.github.marhkb.Pods
          - io.github.alyraffauf.Switchyard
          - io.github.Foldex.AdwSteamGtk
          - org.gnome.TextEditor
          - dev.vencord.Vesktop
          - org.signal.Signal
          - com.github.zocker_160.SyncThingy
          - com.valvesoftware.Steam
          - net.davidotek.pupgui2
          - net.lutris.Lutris
          - org.freedesktop.Platform.VulkanLayer.MangoHud//25.08
          - org.freedesktop.Platform.VulkanLayer.MangoHud//24.08
          - org.freedesktop.Platform.VulkanLayer.gamescope//25.08
          - org.freedesktop.Platform.VulkanLayer.gamescope//24.08

  - type: systemd
    system:
      enabled:
        - nocblue-brew-formulae.service
        - nocblue-flatpak-overrides.service
        - nocblue-hardened-malloc-flatpaks.service
        - nocblue-session-defaults.service
        - bootc-fetch-apply-updates.timer
        - flatpak-system-update.timer
        - input-remapper.service
        - firewalld.service
      masked:
        - geoclue.service
        - rpm-ostree-countme.timer
        - sshd.service
        - sshd.socket
        - sshd-keygen.target
    user:
      enabled:
        - nocblue-user-defaults.service
        - nocblue-noctalia-theme.service
        - nocblue-adwsteamgtk.timer
        - nocblue-flatpak-icon-fixes.service

  - type: script
    scripts:
      - finalize.sh
      - validate-image.sh

  - type: signing
