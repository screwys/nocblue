name: hardened

on:
  push:
    branches:
      - main
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:
    inputs:
      publish:
        description: Publish ghcr.io/screwys/nocblue-hardened:latest after the build
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  static:
    name: static checks
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: shell syntax
        run: |
          find files/scripts files/system/usr/bin -type f -print0 | xargs -0 -r bash -n

      - name: hardened repository shape
        run: |
          test -f recipes/nocblue-hardened.yml
          test ! -e Containerfile
          test ! -d build_files
          grep -q 'base-image: ghcr.io/secureblue/silverblue-main-hardened' recipes/nocblue-hardened.yml
          grep -q 'name: nocblue-hardened$' recipes/nocblue-hardened.yml
          grep -q 'image-version: 44' recipes/nocblue-hardened.yml
          grep -q 'without_preload pipx install' files/scripts/install-pywalfox.sh
          grep -q 'without_preload /usr/bin/pywalfox install --global' files/scripts/install-pywalfox.sh

  build:
    name: build hardened image
    needs: static
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: build hardened image
        uses: blue-build/github-action@v1.11.1
        with:
          recipe: nocblue-hardened.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
          use_cache: false
          rechunk: false
          push: ${{ github.event_name == 'push' || github.event_name == 'schedule' || inputs.publish == 'true' }}
