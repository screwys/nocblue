name: iso

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - bluebuild
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  IMAGE_NAME: nocblue
  IMAGE_REGISTRY: ghcr.io/screwys
  DEFAULT_TAG: latest

jobs:
  iso:
    name: build live installer iso
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    steps:
      - name: prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> "${GITHUB_ENV}"
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "${GITHUB_ENV}"

      - name: maximize build space
        uses: ublue-os/remove-unwanted-software@v9
        with:
          remove-codeql: true

      - name: checkout
        uses: actions/checkout@v6

      - name: validate installer args
        run: |
          set -euo pipefail
          test -f iso_files/configure_iso_anaconda.sh
          test -f files/system/usr/share/nocblue/manifests/flatpaks.txt
          grep -q -- "uses: ublue-os/titanoboa@main" .github/workflows/iso.yml
          grep -q -- "container-image:" .github/workflows/iso.yml
          grep -q -- "hook-post-rootfs:" .github/workflows/iso.yml
          grep -q -- "iso-dest: nocblue-live-installer.iso" .github/workflows/iso.yml
          grep -q -- "anaconda-live" iso_files/configure_iso_anaconda.sh
          grep -q -- 'install_image="ghcr.io/screwys/nocblue:latest"' iso_files/configure_iso_anaconda.sh
          grep -q -- 'ostreecontainer --url=${install_image} --transport=containers-storage' iso_files/configure_iso_anaconda.sh
          forbidden_type='types: bootc''-installer'
          forbidden_payload='--installer''-payload-ref='
          ! grep -q -- "${forbidden_type}" .github/workflows/iso.yml
          ! grep -q -- "${forbidden_payload}" .github/workflows/iso.yml

      - name: log in to ghcr
        run: |
          echo "${{ github.token }}" | sudo podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: build live iso
        id: build
        uses: ublue-os/titanoboa@main
        with:
          image-ref: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}
          container-image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}
          flatpaks-list: ${{ github.workspace }}/files/system/usr/share/nocblue/manifests/flatpaks.txt
          hook-post-rootfs: ${{ github.workspace }}/iso_files/configure_iso_anaconda.sh
          compression: squashfs
          kargs: ""
          builder-distro: fedora
          iso-dest: nocblue-live-installer.iso

      - name: checksum iso
        run: |
          mkdir -p output
          install -m 0644 "${{ steps.build.outputs.iso-dest }}" output/nocblue-live-installer.iso
          cd output
          sha256sum nocblue-live-installer.iso | tee nocblue-live-installer.iso.sha256

      - name: upload iso
        uses: actions/upload-artifact@v7
        with:
          name: nocblue-installer-iso
          path: output
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
          overwrite: true
