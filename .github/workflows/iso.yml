name: iso

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - bluebuild
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

env:
  IMAGE_NAME: nocblue
  IMAGE_REGISTRY: ghcr.io/screwys
  DEFAULT_TAG: latest
  BIB_IMAGE: quay.io/centos-bootc/bootc-image-builder:latest

jobs:
  iso:
    name: build installer iso
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    steps:
      - name: prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> "${GITHUB_ENV}"
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "${GITHUB_ENV}"
          echo "USER_UID=$(id -u)" >> "${GITHUB_ENV}"
          echo "USER_GID=$(id -g)" >> "${GITHUB_ENV}"

      - name: maximize build space
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e
        with:
          remove-codeql: true

      - name: checkout
        uses: actions/checkout@v4

      - name: build iso
        id: build
        uses: osbuild/bootc-image-builder-action@main
        with:
          builder-image: ${{ env.BIB_IMAGE }}
          config-file: ./disk_config/iso.toml
          image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}
          chown: ${{ env.USER_UID }}:${{ env.USER_GID }}
          types: anaconda-iso
          additional-args: --use-librepo=True

      - name: upload iso
        uses: actions/upload-artifact@v4
        with:
          name: nocblue-installer-iso
          path: ${{ steps.build.outputs.output-directory }}
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
          overwrite: true
