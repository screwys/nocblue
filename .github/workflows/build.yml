name: bluebuild

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  static:
    name: static checks
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@v7

      - name: shell syntax
        run: |
          find files/scripts files/system/usr/bin files/compat/usr/libexec \
            -type f -print0 | xargs -0 -r bash -n

      - name: repository shape
        run: |
          test -f recipes/recipe.yml
          test -f recipes/compat.yml
          test ! -e recipes/nocblue-hardened.yml
          test ! -e Containerfile
          test ! -d build_files

          grep -q 'name: nocblue-fedora-openrazer$' recipes/compat.yml
          grep -q 'base-image: ghcr.io/secureblue/silverblue-main-hardened' recipes/compat.yml
          grep -q 'image-version: 44' recipes/compat.yml
          grep -q 'ghcr.io/ublue-os/akmods:main-44' recipes/compat.yml
          grep -q 'src=/kernel-rpms' recipes/compat.yml
          grep -q 'src=/rpms' recipes/compat.yml
          grep -q 'type: initramfs' recipes/compat.yml
          grep -q 'validate-fedora-openrazer-compat.sh' recipes/compat.yml
          # A blanket kernel* exclusion also blocks kernel-headers, which is
          # required by glibc-devel and many development packages.
          ! grep -RIn '^[[:space:]]*- "kernel\*"$' recipes
          for recipe in recipes/compat.yml recipes/recipe.yml; do
            grep -q '^[[:space:]]*- kernel$' "${recipe}"
            grep -q '^[[:space:]]*- kernel-core$' "${recipe}"
            grep -q '^[[:space:]]*- kernel-modules$' "${recipe}"
            grep -q '^[[:space:]]*- kernel-modules-core$' "${recipe}"
            grep -q '^[[:space:]]*- kernel-modules-extra$' "${recipe}"
            grep -q '^[[:space:]]*- "kernel-uki\*"$' "${recipe}"
          done

          grep -q 'name: nocblue$' recipes/recipe.yml
          grep -q 'base-image: ghcr.io/screwys/nocblue-fedora-openrazer' recipes/recipe.yml
          grep -q 'image-version: latest' recipes/recipe.yml
          grep -q 'configure-nocblue-branding.sh' recipes/recipe.yml
          grep -q 'type: initramfs' recipes/recipe.yml
          grep -q 'validate-fedora-openrazer-compat.sh' recipes/recipe.yml
          ! grep -q 'ghcr.io/ublue-os/akmods:main-44' recipes/recipe.yml
          ! grep -q 'ublue-akmods.repo' recipes/recipe.yml
          ! grep -q 'openrazer.repo' recipes/recipe.yml

          test -x files/compat/usr/libexec/nocblue/install-fedora-openrazer-compat.sh
          test -x files/compat/usr/libexec/nocblue/validate-fedora-openrazer-compat.sh
          test -f files/compat/usr/lib/dracut/dracut.conf.d/98-nocblue-preload-libraries.conf
          grep -q '/usr/lib64/libno_rlimit_as.so' \
            files/compat/usr/lib/dracut/dracut.conf.d/98-nocblue-preload-libraries.conf
          grep -q '/etc/ld.so.cache' \
            files/compat/usr/lib/dracut/dracut.conf.d/98-nocblue-preload-libraries.conf

          ! grep -RIn '/usr/share/plymouth/themes/spinner/watermark.png' recipes files
          test ! -e files/system/usr/lib/dracut/dracut.conf.d/99-nocblue-installer-tmpdir.conf
          test ! -e files/system/usr/lib/tmpfiles.d/nocblue-installer.conf
          grep -q 'noctalia-v5.repo' recipes/recipe.yml
          grep -q '^[[:space:]]*- noctalia-git$' recipes/recipe.yml
          grep -q '^[[:space:]]*- noctalia-greeter$' recipes/recipe.yml
          grep -q '^[[:space:]]*- greetd$' recipes/recipe.yml
          grep -q '^[[:space:]]*- greetd.service$' recipes/recipe.yml
          grep -q '^[[:space:]]*- noctalia.service$' recipes/recipe.yml
          ! grep -q 'configure-hardened-branding.sh' recipes/recipe.yml
          ! grep -RIn 'type: akmods' recipes
          ! grep -RIn 'build-openrazer-akmod.sh' recipes files
          grep -q '^[[:space:]]*- librewolf$' recipes/recipe.yml
          ! grep -Eq '^[[:space:]]*- [^[:space:]#]+-[0-9][^[:space:]]*(\.(x86_64|noarch|aarch64|i686))?$' recipes/recipe.yml
          ! grep -Eq 'plasma-workspace-[0-9]' recipes/recipe.yml
          ! grep -Eq '^[[:space:]]*- (anaconda|anaconda-core|anaconda-dracut|anaconda-install-env-deps|dracut-config-generic|dracut-network|net-tools|squashfs-tools|lorax-templates-generic|biosdevname|prefixdevname|python3-mako)$' recipes/recipe.yml
          grep -q 'restore_preload' files/scripts/install-pywalfox.sh
          grep -q 'env -u LD_PRELOAD' files/scripts/install-pywalfox.sh
          grep -q 'without_preload pipx install' files/scripts/install-pywalfox.sh
          grep -q 'without_preload /usr/bin/pywalfox install --global' files/scripts/install-pywalfox.sh
          grep -q '^repo_gpgcheck=0$' files/dnf/librewolf.repo
          ! grep -RInE 'kernel-cachyos|cachyos-settings|dms|DankMaterialShell' recipes manifests README.md
          grep -q '! rpm -q kernel-cachyos' files/system/usr/bin/nocblue-tests

      - name: no private paths
        run: |
          ! grep -RInE '(/home/[[:alnum:]_.-]+/(\.config|Development|Server|Downloads|Documents|Pictures|Videos)|/mnt/[[:alnum:]_.-]+|wallpaperengine|workshop)' \
            recipes files manifests README.md

  compatibility:
    name: build Fedora/OpenRazer compatibility base
    needs: static
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: build compatibility image
        uses: blue-build/github-action@v1.11.1
        with:
          recipe: compat.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
          use_cache: false
          rechunk: false
          push: ${{ github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

  bluebuild:
    name: build nocblue image
    needs: compatibility
    # A pull request fully builds the compatibility base. The downstream image
    # starts building after merge, once that base has been published as latest.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: build custom image
        uses: blue-build/github-action@v1.11.1
        with:
          recipe: recipe.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          maximize_build_space: true
          use_cache: false
          rechunk: false
          push: true
